<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
	* { box-sizing: border-box; margin: 0; padding: 0 }
	body { font-family: 'Pretendard', sans-serif; background: #0a0e13; color: #ece8e1 }
	.app { padding: 1rem 0; display: grid; grid-template-columns: 320px 1fr; gap: 16px }
	.panel { background: #0f1620; border: 1px solid #1e2d3d; border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; max-height: 820px }
	.panel-title { font-size: 10px; font-weight: 700; letter-spacing: .14em; color: #ff4655; text-transform: uppercase; border-bottom: 1px solid #1e2d3d; padding-bottom: 10px }
	.sec-label { font-size: 10px; color: #4a6070; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; margin-top: 2px }
	.field { display: flex; flex-direction: column; gap: 4px }
	.field label { font-size: 10px; color: #5a7080; font-weight: 600; letter-spacing: .08em; text-transform: uppercase }
	.field input, .field select { background: #080e18; border: 1px solid #1e2d3d; border-radius: 5px; color: #ece8e1; font-size: 12px; font-family: 'Pretendard', sans-serif; padding: 7px 9px; width: 100%; outline: none; transition: border .15s }
	.field input:focus, .field select:focus { border-color: #ff4655 }
	.field input::placeholder { color: #2a3a4a }
	.players-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px }
	.slot { background: #080e18; border: 1px solid #1e2d3d; border-radius: 6px; padding: 9px 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 7px }
	.slot-num { font-size: 9px; color: #ff4655; font-weight: 700; letter-spacing: .12em; grid-column: 1/-1; margin-bottom: 2px; text-transform: uppercase }
	.btn { padding: 9px 0; border-radius: 5px; font-size: 12px; font-weight: 700; font-family: 'Pretendard', sans-serif; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; border: none; width: 100%; transition: opacity .15s }
	.btn:hover { opacity: .82 }
	.btn-export { background: #ff4655; color: #fff }
	.btn-clear { background: #1a2535; color: #7c8fa0 }
	.preview-wrap { background: #080e18; border: 1px solid #1e2d3d; border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 520px }
	canvas { display: block; max-width: 100%; height: auto }
	select option { background: #080e18; color: #ece8e1; font-family: 'Pretendard', sans-serif }
	optgroup { font-size: 10px }
	.status { font-size: 11px; color: #3a5060; text-align: center; padding: 4px 0; min-height: 20px }
	.map-saves { display: flex; flex-direction: column; gap: 4px }
	.save-item { background: #080e18; border: 1px solid #1e2d3d; border-radius: 5px; padding: 7px 10px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: border .15s }
	.save-item:hover { border-color: #ff4655 }
	.save-item-name { font-size: 12px; font-weight: 600; color: #ece8e1 }
	.save-item-date { font-size: 10px; color: #4a6070 }
	.del-btn { background: none; border: none; color: #3a5060; cursor: pointer; font-size: 14px; padding: 0 2px; font-family: 'Pretendard', sans-serif }
	.del-btn:hover { color: #ff4655 }
	.tabs { display: flex; gap: 0 }
	.tab { flex: 1; padding: 8px 0; font-size: 11px; font-weight: 700; font-family: 'Pretendard', sans-serif; letter-spacing: .06em; text-transform: uppercase; cursor: pointer; border: 1px solid #1e2d3d; background: #080e18; color: #4a6070; text-align: center; transition: all .15s }
	.tab:first-child { border-radius: 5px 0 0 5px }
	.tab:last-child { border-radius: 0 5px 5px 0 }
	.tab.active { background: #ff4655; color: #fff; border-color: #ff4655 }
	.tab-content { display: none }
	.tab-content.active { display: flex; flex-direction: column; gap: 12px }
</style>

<div class="app">
	<div class="panel">
		<div class="panel-title">VALORANT TEAM BUILDER</div>

		<div class="tabs">
			<div class="tab active" onclick="switchTab('edit')">편집</div>
			<div class="tab" onclick="switchTab('saves')">저장목록</div>
		</div>

		<div id="tab-edit" class="tab-content active">
			<div class="sec-label">맵 선택</div>
			<div class="field">
				<select id="mapSel" onchange="onMapChange()">
					<option value="">맵 선택...</option>
					<option value="어센트" data-url="https://static.wikia.nocookie.net/valorant/images/e/e7/Loading_Screen_Ascent.png">어센트</option>
					<option value="바인드" data-url="https://static.wikia.nocookie.net/valorant/images/2/23/Loading_Screen_Bind.png">바인드</option>
					<option value="헤이븐" data-url="https://static.wikia.nocookie.net/valorant/images/7/70/Loading_Screen_Haven.png">헤이븐</option>
					<option value="스플릿" data-url="https://static.wikia.nocookie.net/valorant/images/d/d6/Loading_Screen_Split.png">스플릿</option>
					<option value="아이스박스" data-url="https://static.wikia.nocookie.net/valorant/images/1/13/Loading_Screen_Icebox.png">아이스박스</option>
					<option value="브리즈" data-url="https://static.wikia.nocookie.net/valorant/images/1/10/Loading_Screen_Breeze.png">브리즈</option>
					<option value="프랙쳐" data-url="https://static.wikia.nocookie.net/valorant/images/f/fc/Loading_Screen_Fracture.png">프랙쳐</option>
					<option value="펄" data-url="https://static.wikia.nocookie.net/valorant/images/a/af/Loading_Screen_Pearl.png">펄</option>
					<option value="로터스" data-url="https://static.wikia.nocookie.net/valorant/images/d/d0/Loading_Screen_Lotus.png">로터스</option>
					<option value="선셋" data-url="https://static.wikia.nocookie.net/valorant/images/5/5c/Loading_Screen_Sunset.png">선셋</option>
					<option value="어비스" data-url="https://static.wikia.nocookie.net/valorant/images/6/61/Loading_Screen_Abyss.png">어비스</option>
				</select>
			</div>

			<div class="field">
				<label>맵 이미지 URL (직접 입력)</label>
				<input type="text" id="mapUrl" placeholder="https://..." oninput="loadMapFromUrl(this.value)">
			</div>

			<div class="sec-label">플레이어 이름</div>
			<div class="players-grid">
				<div class="field"><label>P1</label><input type="text" id="p1" placeholder="이름" oninput="savePlayers();rebuildSlots()"></div>
				<div class="field"><label>P2</label><input type="text" id="p2" placeholder="이름" oninput="savePlayers();rebuildSlots()"></div>
				<div class="field"><label>P3</label><input type="text" id="p3" placeholder="이름" oninput="savePlayers();rebuildSlots()"></div>
				<div class="field"><label>P4</label><input type="text" id="p4" placeholder="이름" oninput="savePlayers();rebuildSlots()"></div>
				<div class="field"><label>P5</label><input type="text" id="p5" placeholder="이름" oninput="savePlayers();rebuildSlots()"></div>
			</div>

			<div class="sec-label">역할 배정 <span id="cur-map-label"></span></div>
			<div id="slots" style="display:flex;flex-direction:column;gap:6px"></div>

			<div style="display:flex;flex-direction:column;gap:7px;margin-top:4px">
				<button class="btn btn-export" onclick="saveCurrentMap()">현재 맵 저장</button>
				<button class="btn btn-export" style="background:#1a6fff" onclick="renderAndExport()">이미지 저장 (PNG)</button>
				<button class="btn btn-clear" onclick="clearSlots()">배정 초기화</button>
			</div>
		</div>

		<div id="tab-saves" class="tab-content">
			<div class="sec-label">저장된 맵 조합</div>
			<div id="saves-list" class="map-saves"></div>
		</div>
	</div>

	<div style="display:flex;flex-direction:column;gap:8px">
		<div class="preview-wrap"><canvas id="cv"></canvas></div>
		<div id="statusMsg" class="status"></div>
	</div>
</div>

<script>
	const AGENTS = {
		"타격대": ["네온", "레이나", "레이즈", "아이소", "요루", "웨이레이", "제트", "피닉스"],
		"척후대": ["게코", "브리치", "소바", "스카이", "케이/오", "테호", "페이드"],
		"감시자": ["데드록", "바이스", "비토", "사이퍼", "세이지", "체임버", "킬조이"],
		"전략가": ["믹스", "바이퍼", "브림스톤", "아스트라", "오멘", "클로브", "하버"]
	};
	const ROLE_COLORS = {
		"타격대": { main: "#E84040", light: "rgba(232,64,64,0.18)", glow: "rgba(232,64,64,0.5)" },
		"척후대": { main: "#3A8FFF", light: "rgba(58,143,255,0.18)", glow: "rgba(58,143,255,0.5)" },
		"감시자": { main: "#F5C518", light: "rgba(245,197,24,0.18)", glow: "rgba(245,197,24,0.5)" },
		"전략가": { main: "#3ECF6A", light: "rgba(62,207,106,0.18)", glow: "rgba(62,207,106,0.5)" }
	};
	const ROLE_ICONS = {
		"타격대": "https://media.valorant-api.com/roles/d11e304d-424b-8557-91f6-95906d2d4157/displayicon.png",
		"척후대": "https://media.valorant-api.com/roles/f94c3b30-42be-e959-889c-5aa313dba261/displayicon.png",
		"감시자": "https://media.valorant-api.com/roles/598ca183-4a68-e291-0335-71874b1c3121/displayicon.png",
		"전략가": "https://media.valorant-api.com/roles/4ee40553-8d35-31a3-ad60-24422e49c71b/displayicon.png"
	};
	const ROLE_OF = {};
	Object.entries(AGENTS).forEach(([r, arr]) => arr.forEach(a => ROLE_OF[a] = r));

	const BASE = "https://media.valorant-api.com/agents/";
	const FP = "/fullportrait.png";
	let AGENT_PORTRAITS = {};

	const KO_TO_EN = {
		"네온": "Neon", "레이나": "Reyna", "레이즈": "Raze", "아이소": "Iso", "요루": "Yoru",
		"웨이레이": "Waylay", "제트": "Jett", "피닉스": "Phoenix", "게코": "Gekko", "브리치": "Breach",
		"소바": "Sova", "스카이": "Skye", "케이/오": "KAY/O", "테호": "Tejo", "페이드": "Fade",
		"데드록": "Deadlock", "바이스": "Vyse", "사이퍼": "Cypher", "세이지": "Sage", "체임버": "Chamber",
		"킬조이": "Killjoy", "비토": "Viper", "믹스": "Clove", "바이퍼": "Viper", "브림스톤": "Brimstone",
		"아스트라": "Astra", "오멘": "Omen", "클로브": "Clove", "하버": "Harbor"
	};

	async function fetchAgentPortraits() {
		try {
			setStatus("요원 이미지 로딩 중...");
			const res = await fetch("https://valorant-api.com/v1/agents?isPlayableCharacter=true&language=ko-KR");
			const json = await res.json();
			const byKo = {}, byEn = {};
			json.data.forEach(a => {
				const url = BASE + a.uuid + FP;
				byKo[a.displayName] = url;
				byEn[a.developerName?.toLowerCase()] = url;
				byEn[a.displayName?.toLowerCase()] = url;
			});
			const allAgents = Object.values(AGENTS).flat();
			allAgents.forEach(koName => {
				if (byKo[koName]) { AGENT_PORTRAITS[koName] = byKo[koName]; return; }
				const en = KO_TO_EN[koName];
				if (en && byEn[en.toLowerCase()]) { AGENT_PORTRAITS[koName] = byEn[en.toLowerCase()]; return; }
			});
			setStatus(""); renderPreview();
		} catch (e) {
			setStatus("요원 이미지 API 연결 실패");
			console.warn(e);
		}
	}

	let mapImg = null;
	let curMap = "";
	const roleIconImgs = {};
	const agentImgCache = {};

	function loadRoleIcons() {
		Object.entries(ROLE_ICONS).forEach(([role, url]) => {
			const img = new Image(); img.crossOrigin = 'anonymous';
			img.onload = () => { roleIconImgs[role] = img; renderPreview() };
			img.src = url;
		});
	}

	function getAgentImg(agentName) {
		if (!agentName) return null;
		if (agentImgCache[agentName]) return agentImgCache[agentName];
		const url = AGENT_PORTRAITS[agentName];
		if (!url) return null;
		const img = new Image();
		img.crossOrigin = 'anonymous';
		agentImgCache[agentName] = { img, loaded: false };
		img.onload = () => { agentImgCache[agentName].loaded = true; renderPreview(); };
		img.onerror = () => { agentImgCache[agentName].error = true; };
		img.src = url;
		return agentImgCache[agentName];
	}

	function getPlayers() {
		return [1, 2, 3, 4, 5].map(i => {
			const v = document.getElementById('p' + i)?.value.trim();
			return v || `플레이어 ${i}`;
		});
	}
	function savePlayers() {
		const d = {}; [1, 2, 3, 4, 5].forEach(i => d['p' + i] = document.getElementById('p' + i)?.value || '');
		try { localStorage.setItem('valo_players', JSON.stringify(d)) } catch { }
	}
	function loadPlayers() {
		try {
			const d = JSON.parse(localStorage.getItem('valo_players') || '{}');
			[1, 2, 3, 4, 5].forEach(i => { const el = document.getElementById('p' + i); if (el && d['p' + i]) el.value = d['p' + i] });
		} catch { }
	}

	function getMapData(map) {
		try { return JSON.parse(localStorage.getItem('valo_map_' + map) || 'null') } catch { return null }
	}
	function saveMapData(map, data) {
		try { localStorage.setItem('valo_map_' + map, JSON.stringify(data)) } catch { }
	}
	function getAllSavedMaps() {
		try { return JSON.parse(localStorage.getItem('valo_saved_list') || '[]') } catch { return [] }
	}
	function addToSavedList(map) {
		const list = getAllSavedMaps();
		if (!list.find(x => x.map === map)) { list.push({ map, date: new Date().toLocaleDateString('ko-KR') }) }
		else { const idx = list.findIndex(x => x.map === map); list[idx].date = new Date().toLocaleDateString('ko-KR') }
		try { localStorage.setItem('valo_saved_list', JSON.stringify(list)) } catch { }
	}
	function removeSavedMap(map) {
		let list = getAllSavedMaps().filter(x => x.map !== map);
		try { localStorage.setItem('valo_saved_list', JSON.stringify(list)); localStorage.removeItem('valo_map_' + map) } catch { }
	}

	function buildAgentOptions() {
		let html = '<option value="">요원 선택</option>';
		Object.entries(AGENTS).forEach(([role, arr]) => {
			const c = ROLE_COLORS[role].main;
			html += `<optgroup label="── ${role} ──" style="color:${c}">`;
			arr.forEach(a => html += `<option value="${a}">${a}</option>`);
			html += '</optgroup>';
		});
		return html;
	}

	function rebuildSlots() {
		const players = getPlayers();
		const container = document.getElementById('slots');
		const prev = getSlotValues();
		container.innerHTML = '';
		const agentOpts = buildAgentOptions();
		for (let i = 1; i <= 5; i++) {
			let popts = '<option value="">플레이어 선택</option>';
			players.forEach(p => popts += `<option value="${p}">${p}</option>`);
			const div = document.createElement('div');
			div.className = 'slot';
			div.innerHTML = `<div class="slot-num">역할 ${i}</div>
      <div class="field"><select id="ag${i}" onchange="renderPreview()">${agentOpts}</select></div>
      <div class="field"><select id="pl${i}" onchange="renderPreview()">${popts}</select></div>`;
			container.appendChild(div);
			if (prev[i - 1]) {
				document.getElementById('ag' + i).value = prev[i - 1].agent || '';
				document.getElementById('pl' + i).value = prev[i - 1].player || '';
			}
		}
		renderPreview();
	}

	function getSlotValues() {
		const res = [];
		for (let i = 1; i <= 5; i++) {
			res.push({
				agent: document.getElementById('ag' + i)?.value || '',
				player: document.getElementById('pl' + i)?.value || ''
			});
		}
		return res;
	}

	function applySlotValues(data) {
		if (!data) return;
		const players = getPlayers();
		for (let i = 1; i <= 5; i++) {
			const sel = document.getElementById('pl' + i);
			if (sel) {
				let popts = '<option value="">플레이어 선택</option>';
				players.forEach(p => popts += `<option value="${p}">${p}</option>`);
				sel.innerHTML = popts;
			}
			if (data[i - 1]) {
				const a = document.getElementById('ag' + i);
				const p = document.getElementById('pl' + i);
				if (a) a.value = data[i - 1].agent || '';
				if (p) p.value = data[i - 1].player || '';
			}
		}
	}

	function onMapChange() {
		const sel = document.getElementById('mapSel');
		const opt = sel.options[sel.selectedIndex];
		curMap = sel.value;
		document.getElementById('cur-map-label').textContent = curMap ? `— ${curMap}` : '';
		const url = opt?.getAttribute('data-url') || '';
		if (url) { document.getElementById('mapUrl').value = url; loadMapFromUrl(url); }
		else { mapImg = null; renderPreview(); }
		const saved = getMapData(curMap);
		if (saved) applySlotValues(saved);
		else clearSlotsOnly();
	}

	function loadMapFromUrl(url) {
		if (!url) { mapImg = null; renderPreview(); return; }
		setStatus('맵 이미지 로딩 중...');
		const img = new Image(); img.crossOrigin = 'anonymous';
		img.onload = () => { mapImg = img; renderPreview(); setStatus(''); };
		img.onerror = () => { setStatus('이미지 로드 실패 — 다른 URL을 시도해보세요.'); mapImg = null; renderPreview(); };
		img.src = url + '?' + Date.now();
	}

	function saveCurrentMap() {
		if (!curMap) { setStatus('먼저 맵을 선택해주세요.'); return; }
		saveMapData(curMap, getSlotValues());
		addToSavedList(curMap);
		renderSavesList();
		setStatus(`"${curMap}" 조합 저장 완료!`);
		setTimeout(() => setStatus(''), 2500);
	}

	function clearSlots() { clearSlotsOnly(); renderPreview(); }
	function clearSlotsOnly() {
		for (let i = 1; i <= 5; i++) {
			const a = document.getElementById('ag' + i), p = document.getElementById('pl' + i);
			if (a) a.value = ''; if (p) p.value = '';
		}
	}

	function setStatus(m) { document.getElementById('statusMsg').textContent = m; }

	function switchTab(name) {
		['edit', 'saves'].forEach(n => {
			document.getElementById('tab-' + n).classList.toggle('active', n === name);
			document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['edit', 'saves'][i] === name));
		});
		if (name === 'saves') renderSavesList();
	}

	function renderSavesList() {
		const list = getAllSavedMaps();
		const el = document.getElementById('saves-list');
		if (!list.length) { el.innerHTML = '<div style="font-size:12px;color:#3a5060;padding:8px 0">저장된 조합이 없습니다.</div>'; return; }
		el.innerHTML = list.map(item => `
    <div class="save-item" onclick="loadSave('${item.map}')">
      <div><div class="save-item-name">${item.map}</div><div class="save-item-date">${item.date}</div></div>
      <button class="del-btn" onclick="event.stopPropagation();deleteSave('${item.map}')">×</button>
    </div>`).join('');
	}

	function loadSave(map) {
		switchTab('edit');
		const sel = document.getElementById('mapSel');
		sel.value = map;
		curMap = map;
		document.getElementById('cur-map-label').textContent = `— ${map}`;
		const opt = [...sel.options].find(o => o.value === map);
		const url = opt?.getAttribute('data-url') || '';
		if (url) { document.getElementById('mapUrl').value = url; loadMapFromUrl(url); }
		const saved = getMapData(map);
		rebuildSlots();
		if (saved) applySlotValues(saved);
	}

	function deleteSave(map) {
		removeSavedMap(map); renderSavesList();
		setStatus(`"${map}" 조합 삭제됨`); setTimeout(() => setStatus(''), 2000);
	}

	function renderPreview() { draw(document.getElementById('cv'), 1); }

	function draw(cv, sc) {
		const W = 1280 * sc, H = 640 * sc;
		cv.width = W; cv.height = H;
		const ctx = cv.getContext('2d');
		ctx.clearRect(0, 0, W, H);

		ctx.fillStyle = '#090d14';
		ctx.fillRect(0, 0, W, H);

		if (mapImg) {
			const iw = mapImg.naturalWidth, ih = mapImg.naturalHeight;
			const s2 = Math.max(W / iw, H / ih);
			const dw = iw * s2, dh = ih * s2;
			ctx.save(); ctx.globalAlpha = 0.28;
			ctx.drawImage(mapImg, (W - dw) / 2, (H - dh) / 2, dw, dh);
			ctx.restore();
			const grad = ctx.createLinearGradient(0, 0, 0, H);
			grad.addColorStop(0, 'rgba(9,13,20,0.7)');
			grad.addColorStop(0.4, 'rgba(9,13,20,0.35)');
			grad.addColorStop(1, 'rgba(9,13,20,0.92)');
			ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
		}

		const F = (size, weight = 400) => `${weight} ${size * sc}px 'Pretendard',sans-serif`;

		ctx.save();
		ctx.fillStyle = 'rgba(9,13,20,0.72)';
		ctx.fillRect(0, 0, W, 88 * sc);
		ctx.restore();

		ctx.strokeStyle = '#ff4655'; ctx.lineWidth = 2 * sc;
		ctx.beginPath(); ctx.moveTo(0, 88 * sc); ctx.lineTo(W, 88 * sc); ctx.stroke();

		const mn = (curMap || document.getElementById('mapSel')?.value || 'MAP').toUpperCase();
		ctx.font = F(46, 800); ctx.fillStyle = '#ffffff';
		ctx.fillText(mn, 44 * sc, 62 * sc);

		ctx.font = F(12, 500); ctx.fillStyle = '#ff4655';
		ctx.letterSpacing = (3 * sc) + 'px';
		ctx.fillText('TEAM COMPOSITION', 46 * sc, 80 * sc);
		ctx.letterSpacing = '0px';

		const slots = getSlotValues();
		const N = 5;
		const padX = 32 * sc;
		const availW = W - padX * 2;
		const cardW = availW / N - 10 * sc;
		const cardGap = (availW - cardW * N) / (N - 1);
		const cardH = 460 * sc;
		const cardY = 108 * sc;

		for (let i = 0; i < N; i++) {
			const { agent, player } = slots[i];
			const cx = padX + i * (cardW + cardGap);
			const role = agent ? ROLE_OF[agent] : '';
			const rc = role ? ROLE_COLORS[role] : null;

			ctx.save();
			ctx.fillStyle = 'rgba(8, 12, 22, 0.82)';
			rrect(ctx, cx, cardY, cardW, cardH, 10 * sc); ctx.fill();
			if (rc) {
				ctx.strokeStyle = rc.main; ctx.lineWidth = 1.5 * sc;
				rrect(ctx, cx, cardY, cardW, cardH, 10 * sc); ctx.stroke();
				ctx.fillStyle = rc.light;
				rrect(ctx, cx, cardY, cardW, 46 * sc, { tl: 10 * sc, tr: 10 * sc, bl: 0, br: 0 }); ctx.fill();
			} else {
				ctx.strokeStyle = '#1e2d3d'; ctx.lineWidth = 1 * sc;
				rrect(ctx, cx, cardY, cardW, cardH, 10 * sc); ctx.stroke();
				ctx.fillStyle = 'rgba(255, 255, 255, 0.04)';
				rrect(ctx, cx, cardY, cardW, 46 * sc, { tl: 10 * sc, tr: 10 * sc, bl: 0, br: 0 }); ctx.fill();
			}
			ctx.restore();

			const iconImg = role ? roleIconImgs[role] : null;
			const iconSize = 22 * sc;
			const roleX = cx + 14 * sc;
			const roleY = cardY + 13 * sc;
			if (iconImg) {
				try { ctx.drawImage(iconImg, roleX, roleY, iconSize, iconSize); } catch { }
			}
			const roleTextX = iconImg ? roleX + iconSize + 7 * sc : roleX;
			ctx.font = F(11, 700);
			ctx.fillStyle = rc ? rc.main : '#3a5060';
			ctx.letterSpacing = (1.5 * sc) + 'px';
			ctx.fillText(role ? role.toUpperCase() : 'SLOT ' + (i + 1), roleTextX, cardY + 29 * sc);
			ctx.letterSpacing = '0px';

			const borderOff = 1 * sc;
			const textAreaH = 185 * sc;
			const imgAreaY = cardY + textAreaH;
			const imgAreaH = cardH - textAreaH;

			const entry = agent ? getAgentImg(agent) : null;
			if (entry && entry.loaded) {
				ctx.save();
				rrect(ctx, cx + borderOff, imgAreaY, cardW - borderOff * 2, imgAreaH - borderOff, { tl: 0, tr: 0, bl: 10 * sc, br: 10 * sc });
				ctx.clip();

				const src = entry.img;
				const sw = src.naturalWidth, sh = src.naturalHeight;
				const drawScale = Math.max(cardW / sw, imgAreaH / sh) * 1.05;
				const dw = sw * drawScale, dh = sh * drawScale;
				const dx = cx + (cardW - dw) / 2;
				const dy = imgAreaY + (imgAreaH - dh) * 0.1;
				ctx.drawImage(src, dx, dy, dw, dh);

				const fadeH = imgAreaH * 0.45;
				const fadeGrad = ctx.createLinearGradient(0, imgAreaY, 0, imgAreaY + fadeH);
				fadeGrad.addColorStop(0, 'rgba(8, 12, 22, 0.92)');
				fadeGrad.addColorStop(1, 'rgba(8, 12, 22, 0)');
				ctx.fillStyle = fadeGrad;
				ctx.fillRect(cx + borderOff, imgAreaY, cardW - borderOff * 2, fadeH);

				if (rc) {
					const botGrad = ctx.createLinearGradient(0, imgAreaY + imgAreaH - 60 * sc, 0, imgAreaY + imgAreaH);
					botGrad.addColorStop(0, 'rgba(8, 12, 22, 0)');
					botGrad.addColorStop(1, rc.main + '55');
					ctx.fillStyle = botGrad;
					ctx.fillRect(cx + borderOff, imgAreaY + imgAreaH - 60 * sc, cardW - borderOff * 2, 60 * sc);
				}
				ctx.restore();
			} else {
				ctx.save();
				rrect(ctx, cx + borderOff, imgAreaY, cardW - borderOff * 2, imgAreaH - borderOff, { tl: 0, tr: 0, bl: 10 * sc, br: 10 * sc });
				ctx.clip();
				ctx.fillStyle = 'rgba(255, 255, 255, 0.015)';
				ctx.fillRect(cx + borderOff, imgAreaY, cardW - borderOff * 2, imgAreaH - borderOff);
				if (!agent) {
					ctx.font = F(40, 900);
					ctx.fillStyle = 'rgba(255, 255, 255, 0.04)';
					ctx.textAlign = 'center';
					ctx.fillText('?', cx + cardW / 2, imgAreaY + imgAreaH / 2 + 16 * sc);
					ctx.textAlign = 'left';
				}
				ctx.restore();
			}

			if (agent) {
				ctx.font = F(30, 800); ctx.fillStyle = '#ffffff';
				ctx.fillText(agent, cx + 14 * sc, cardY + 110 * sc);
			} else {
				ctx.font = F(18, 400); ctx.fillStyle = '#253545';
				ctx.fillText('미정', cx + 14 * sc, cardY + 110 * sc);
			}

			ctx.strokeStyle = rc ? rc.main : '#1e2d3d'; ctx.lineWidth = 0.8 * sc;
			ctx.beginPath(); ctx.moveTo(cx + 14 * sc, cardY + 126 * sc); ctx.lineTo(cx + cardW - 14 * sc, cardY + 126 * sc); ctx.stroke();

			if (player) {
				ctx.font = F(20, 600); ctx.fillStyle = 'rgba(236, 232, 225, 0.8)';
				ctx.fillText(player, cx + 14 * sc, cardY + 165 * sc);
			} else {
				ctx.font = F(15, 400); ctx.fillStyle = '#253545';
				ctx.fillText('미배정', cx + 14 * sc, cardY + 165 * sc);
			}

			ctx.font = F(36, 900);
			ctx.fillStyle = rc ? rc.main + '33' : '#ffffff0a';
			ctx.textAlign = 'right';
			ctx.fillText(`0${i + 1}`, cx + cardW - 14 * sc, cardY + cardH - 16 * sc);
			ctx.textAlign = 'left';
		}

		ctx.font = F(10, 400); ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
		ctx.fillText("© 2026 SIMSOOL. All rights reserved. | " + new Date().toLocaleDateString('ko-KR').slice(0, -1), W - 240 * sc, H - 10 * sc);
	}

	function rrect(ctx, x, y, w, h, r) {
		let tl, tr, bl, br;
		if (typeof r === 'number') tl = tr = bl = br = r;
		else { tl = r.tl || 0; tr = r.tr || 0; bl = r.bl || 0; br = r.br || 0; }
		ctx.beginPath();
		ctx.moveTo(x + tl, y); ctx.lineTo(x + w - tr, y); ctx.arcTo(x + w, y, x + w, y + tr, tr);
		ctx.lineTo(x + w, y + h - br); ctx.arcTo(x + w, y + h, x + w - br, y + h, br);
		ctx.lineTo(x + bl, y + h); ctx.arcTo(x, y + h, x, y + h - bl, bl);
		ctx.lineTo(x, y + tl); ctx.arcTo(x, y, x + tl, y, tl); ctx.closePath();
	}

	function renderAndExport() {
		const hi = document.createElement('canvas');
		draw(hi, 2);
		const a = document.createElement('a');
		const mn = curMap || 'comp';
		a.download = `valo_${mn}_${Date.now()}.png`;
		a.href = hi.toDataURL('image/png'); a.click();
		setStatus('PNG 저장 완료!'); setTimeout(() => setStatus(''), 2500);
	}

	loadRoleIcons(); loadPlayers(); rebuildSlots(); renderSavesList(); fetchAgentPortraits();
</script>
